name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_upload_url: ${{ steps.create.outputs.upload_url }}
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend-prod:
    runs-on: ubuntu-latest
    env:
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PROD }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Validate Convex production deploy key
        shell: bash
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "Missing GitHub Actions secret CONVEX_DEPLOY_KEY_PROD"
            echo "Create a production deploy key for the hosted Convex project and store it as this secret."
            exit 1
          fi

      - name: Deploy Convex backend to production
        run: npx convex deploy

  build-desktop:
    needs:
      - create-release
      - deploy-backend-prod
    env:
      HOSTED_CONVEX_URL: ${{ vars.HOSTED_CONVEX_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install

      - name: Validate hosted production URL
        shell: bash
        run: |
          if [ -z "$HOSTED_CONVEX_URL" ]; then
            echo "Missing GitHub Actions variable HOSTED_CONVEX_URL"
            echo "Set it to your production hosted Convex URL, for example:"
            echo "https://effervescent-squid-842.convex.cloud"
            exit 1
          fi

      - name: Build desktop app
        uses: tauri-apps/tauri-action@action-v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_HOSTED_CONVEX_URL: ${{ env.HOSTED_CONVEX_URL }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseName: "Simple Syncing Audiobook ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          retryAttempts: 3
          args: ${{ matrix.args }}

  build-android:
    needs:
      - create-release
      - deploy-backend-prod
    runs-on: ubuntu-latest
    env:
      HOSTED_CONVEX_URL: ${{ vars.HOSTED_CONVEX_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install

      - name: Validate hosted production URL
        shell: bash
        run: |
          if [ -z "$HOSTED_CONVEX_URL" ]; then
            echo "Missing GitHub Actions variable HOSTED_CONVEX_URL"
            echo "Set it to your production hosted Convex URL, for example:"
            echo "https://effervescent-squid-842.convex.cloud"
            exit 1
          fi

      - name: Generate native Android project
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_HOSTED_CONVEX_URL: ${{ env.HOSTED_CONVEX_URL }}
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          EXPO_PUBLIC_HOSTED_CONVEX_URL: ${{ env.HOSTED_CONVEX_URL }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
             apps/mobile/android/app/build/outputs/apk/release/SimpleSyncingAudiobook-${{ github.ref_name }}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: apps/mobile/android/app/build/outputs/apk/release/SimpleSyncingAudiobook-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
